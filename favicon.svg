<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5F0FF"/>
      <stop offset="50%" stop-color="#EDE8FF"/>
      <stop offset="100%" stop-color="#E6DEFF"/>
    </linearGradient>

    <!-- Bolt gradient -->
    <linearGradient id="boltGrad" x1="540" y1="180" x2="470" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="45%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>

    <!-- Bolt shimmer -->
    <linearGradient id="boltShimmer" x1="480" y1="200" x2="570" y2="580" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Structure gradient -->
    <linearGradient id="structGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EDE8FF"/>
    </linearGradient>

    <!-- Roof gradient -->
    <linearGradient id="roofGrad" x1="195" y1="155" x2="195" y2="370" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E9E2FF"/>
    </linearGradient>

    <!-- Purple accent line gradient -->
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>

    <!-- Outer ring glow -->
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.12"/>
    </radialGradient>

    <!-- Bolt ambient halo -->
    <radialGradient id="boltHalo" cx="50%" cy="52%" r="32%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft shadow for structure -->
    <filter id="structShadow" x="-12%" y="-12%" width="124%" height="136%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#7C3AED" flood-opacity="0.12"/>
    </filter>

    <!-- Glow filter for bolt -->
    <filter id="boltGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20" result="blur"/>
      <feFlood flood-color="#7C3AED" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
      <stop offset="55%" stop-color="#C4B5FD" stop-opacity="0"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.1"/>
    </radialGradient>

    <!-- Pillar gradient -->
    <linearGradient id="pillarGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#F3EEFF"/>
      <stop offset="100%" stop-color="#EAE2FF"/>
    </linearGradient>

    <!-- Clip -->
    <clipPath id="roundClip">
      <rect width="1024" height="1024" rx="220"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bgGrad)"/>

  <!-- Subtle dot pattern -->
  <g clip-path="url(#roundClip)" opacity="0.18">
    <circle cx="128" cy="128" r="2.5" fill="#A78BFA"/>
    <circle cx="256" cy="128" r="2.5" fill="#A78BFA"/>
    <circle cx="384" cy="128" r="2.5" fill="#A78BFA"/>
    <circle cx="512" cy="128" r="2.5" fill="#A78BFA"/>
    <circle cx="640" cy="128" r="2.5" fill="#A78BFA"/>
    <circle cx="768" cy="128" r="2.5" fill="#A78BFA"/>
    <circle cx="896" cy="128" r="2.5" fill="#A78BFA"/>
    <circle cx="128" cy="256" r="2.5" fill="#A78BFA"/>
    <circle cx="256" cy="256" r="2.5" fill="#A78BFA"/>
    <circle cx="384" cy="256" r="2.5" fill="#A78BFA"/>
    <circle cx="512" cy="256" r="2.5" fill="#A78BFA"/>
    <circle cx="640" cy="256" r="2.5" fill="#A78BFA"/>
    <circle cx="768" cy="256" r="2.5" fill="#A78BFA"/>
    <circle cx="896" cy="256" r="2.5" fill="#A78BFA"/>
    <circle cx="128" cy="384" r="2.5" fill="#A78BFA"/>
    <circle cx="256" cy="384" r="2.5" fill="#A78BFA"/>
    <circle cx="384" cy="384" r="2.5" fill="#A78BFA"/>
    <circle cx="512" cy="384" r="2.5" fill="#A78BFA"/>
    <circle cx="640" cy="384" r="2.5" fill="#A78BFA"/>
    <circle cx="768" cy="384" r="2.5" fill="#A78BFA"/>
    <circle cx="896" cy="384" r="2.5" fill="#A78BFA"/>
    <circle cx="128" cy="512" r="2.5" fill="#A78BFA"/>
    <circle cx="256" cy="512" r="2.5" fill="#A78BFA"/>
    <circle cx="384" cy="512" r="2.5" fill="#A78BFA"/>
    <circle cx="512" cy="512" r="2.5" fill="#A78BFA"/>
    <circle cx="640" cy="512" r="2.5" fill="#A78BFA"/>
    <circle cx="768" cy="512" r="2.5" fill="#A78BFA"/>
    <circle cx="896" cy="512" r="2.5" fill="#A78BFA"/>
    <circle cx="128" cy="640" r="2.5" fill="#A78BFA"/>
    <circle cx="256" cy="640" r="2.5" fill="#A78BFA"/>
    <circle cx="384" cy="640" r="2.5" fill="#A78BFA"/>
    <circle cx="512" cy="640" r="2.5" fill="#A78BFA"/>
    <circle cx="640" cy="640" r="2.5" fill="#A78BFA"/>
    <circle cx="768" cy="640" r="2.5" fill="#A78BFA"/>
    <circle cx="896" cy="640" r="2.5" fill="#A78BFA"/>
    <circle cx="128" cy="768" r="2.5" fill="#A78BFA"/>
    <circle cx="256" cy="768" r="2.5" fill="#A78BFA"/>
    <circle cx="384" cy="768" r="2.5" fill="#A78BFA"/>
    <circle cx="512" cy="768" r="2.5" fill="#A78BFA"/>
    <circle cx="640" cy="768" r="2.5" fill="#A78BFA"/>
    <circle cx="768" cy="768" r="2.5" fill="#A78BFA"/>
    <circle cx="896" cy="768" r="2.5" fill="#A78BFA"/>
    <circle cx="128" cy="896" r="2.5" fill="#A78BFA"/>
    <circle cx="256" cy="896" r="2.5" fill="#A78BFA"/>
    <circle cx="384" cy="896" r="2.5" fill="#A78BFA"/>
    <circle cx="512" cy="896" r="2.5" fill="#A78BFA"/>
    <circle cx="640" cy="896" r="2.5" fill="#A78BFA"/>
    <circle cx="768" cy="896" r="2.5" fill="#A78BFA"/>
    <circle cx="896" cy="896" r="2.5" fill="#A78BFA"/>
  </g>

  <!-- Ring glow overlay -->
  <rect width="1024" height="1024" rx="220" fill="url(#ringGlow)"/>

  <!-- Bolt ambient halo -->
  <ellipse cx="512" cy="520" rx="230" ry="270" fill="url(#boltHalo)"/>

  <!-- ── Banking Structure ── -->
  <g filter="url(#structShadow)">

    <!-- Steps bottom -->
    <rect x="148" y="776" width="728" height="34" rx="12" fill="url(#structGrad)" opacity="0.9"/>
    <rect x="148" y="776" width="728" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.6"/>

    <rect x="170" y="742" width="684" height="38" rx="12" fill="url(#structGrad)"/>
    <rect x="170" y="742" width="684" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.6"/>

    <!-- Base slab -->
    <rect x="192" y="674" width="640" height="52" rx="14" fill="url(#structGrad)"/>
    <!-- Base top accent line -->
    <rect x="192" y="674" width="640" height="4" rx="2" fill="url(#accentGrad)"/>

    <!-- Pillar 1 -->
    <rect x="244" y="360" width="66" height="318" rx="14" fill="url(#pillarGrad)"/>
    <rect x="244" y="360" width="8" height="318" rx="4" fill="white" opacity="0.6"/>
    <rect x="244" y="360" width="66" height="318" rx="14" fill="none" stroke="#C4B5FD" stroke-width="1.2" opacity="0.4"/>

    <!-- Pillar 2 -->
    <rect x="380" y="360" width="66" height="318" rx="14" fill="url(#pillarGrad)"/>
    <rect x="380" y="360" width="8" height="318" rx="4" fill="white" opacity="0.6"/>
    <rect x="380" y="360" width="66" height="318" rx="14" fill="none" stroke="#C4B5FD" stroke-width="1.2" opacity="0.4"/>

    <!-- Pillar 3 -->
    <rect x="578" y="360" width="66" height="318" rx="14" fill="url(#pillarGrad)"/>
    <rect x="578" y="360" width="8" height="318" rx="4" fill="white" opacity="0.6"/>
    <rect x="578" y="360" width="66" height="318" rx="14" fill="none" stroke="#C4B5FD" stroke-width="1.2" opacity="0.4"/>

    <!-- Pillar 4 -->
    <rect x="714" y="360" width="66" height="318" rx="14" fill="url(#pillarGrad)"/>
    <rect x="714" y="360" width="8" height="318" rx="4" fill="white" opacity="0.6"/>
    <rect x="714" y="360" width="66" height="318" rx="14" fill="none" stroke="#C4B5FD" stroke-width="1.2" opacity="0.4"/>

    <!-- Entablature beam -->
    <rect x="208" y="318" width="608" height="46" rx="10" fill="url(#roofGrad)"/>
    <rect x="208" y="318" width="608" height="4" rx="2" fill="url(#accentGrad)"/>
    <rect x="208" y="318" width="608" height="46" rx="10" fill="none" stroke="#C4B5FD" stroke-width="1" opacity="0.35"/>

    <!-- Pediment -->
    <path d="M192 324L512 152L832 324Z" fill="url(#roofGrad)"/>
    <path d="M192 324L512 152L832 324" fill="none" stroke="url(#accentGrad)" stroke-width="4" stroke-linejoin="round"/>

    <!-- Pediment surface highlight -->
    <path d="M260 310L512 182L764 310Z" fill="white" opacity="0.35"/>

    <!-- Apex ornament -->
    <circle cx="512" cy="145" r="14" fill="white" stroke="#A78BFA" stroke-width="3"/>
    <circle cx="512" cy="145" r="6" fill="#7C3AED"/>
  </g>

  <!-- ── Thunderbolt ── -->
  <g filter="url(#boltGlow)">
    <path d="
      M550 200
      L388 540
      L500 540
      L456 824
      L650 462
      L534 462
      Z"
      fill="url(#boltGrad)"
    />
    <!-- Shimmer -->
    <path d="
      M550 200
      L388 540
      L500 540
      L456 824
      L650 462
      L534 462
      Z"
      fill="url(#boltShimmer)"
    />
    <!-- Inner edge highlight -->
    <path d="
      M538 232
      L408 516
      L504 516
      L468 758
      L620 488
      L522 488
      Z"
      fill="white"
      opacity="0.12"
    />
  </g>

  <!-- ── Decorative rings ── -->
  <circle cx="512" cy="512" r="442" stroke="#A78BFA" stroke-width="1.5" stroke-opacity="0.2"/>
  <circle cx="512" cy="512" r="402" stroke="#C4B5FD" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="5 9"/>

  <!-- Corner arcs -->
  <path d="M 178 345 A 345 345 0 0 1 345 178" fill="none" stroke="#A78BFA" stroke-width="2.5" stroke-opacity="0.25"/>
  <path d="M 679 178 A 345 345 0 0 1 846 345" fill="none" stroke="#A78BFA" stroke-width="2.5" stroke-opacity="0.25"/>
  <path d="M 178 679 A 345 345 0 0 0 345 846" fill="none" stroke="#A78BFA" stroke-width="2.5" stroke-opacity="0.25"/>
  <path d="M 679 846 A 345 345 0 0 0 846 679" fill="none" stroke="#A78BFA" stroke-width="2.5" stroke-opacity="0.25"/>

  <!-- Vignette -->
  <rect width="1024" height="1024" rx="220" fill="url(#vignette)"/>
</svg>
